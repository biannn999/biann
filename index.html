<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GAJELASSSSS - Profil Black_Cat</title>
    <style>
        /* SEMUA CSS DI SINI */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* GALAXY BG - KODE LAMA */
        .galaxy-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 50%, #000 100%),
                radial-gradient(ellipse at top, #0c0f1a 0%, transparent 50%);
            overflow: hidden;
        }

        .stars {
            position: absolute;
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 
                1744px 122px #FFF, 134px 1321px #FFF, 92px 859px #FFF, 
                1829px 1021px #FFF, 123px 45px #FFF, 1500px 1500px #FFF,
                200px 300px #FFF, 800px 600px #FFF, 1200px 900px #FFF,
                400px 1100px #FFF, 1600px 400px #FFF, 300px 1400px #FFF,
                900px 200px #FFF, 1400px 800px #FFF, 500px 1200px #FFF;
            animation: animStar 70s linear infinite;
            top: 0;
            left: 0;
        }

        .stars2 {
            position: absolute;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 
                1744px 122px #FFF, 134px 1321px #FFF, 92px 859px #FFF, 
                1829px 1021px #FFF, 123px 45px #FFF, 1500px 1500px #FFF;
            animation: animStar 120s linear infinite reverse;
            top: 0;
            left: 0;
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .nebula1 { top: 30%; left: 20%; width: 400px; height: 400px; background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, rgba(0, 0, 0, 0) 70%); animation-delay: 0s; }
        .nebula2 { top: 60%; right: 20%; width: 500px; height: 500px; background: radial-gradient(circle, rgba(30, 144, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%); animation-delay: -2s; }
        .nebula3 { top: 70%; left: 50%; width: 300px; height: 300px; background: radial-gradient(circle, rgba(255, 20, 147, 0.25) 0%, rgba(0, 0, 0, 0) 70%); animation-delay: -4s; }

        /* PROFIL CARD */
        .profile-card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 25px;
            border: 2px solid transparent;
            background-clip: padding-box;
            box-shadow: 
                0 0 0 2px rgba(138, 43, 226, 0.5),
                0 15px 35px rgba(0,0,0,0.5),
                0 0 30px rgba(138, 43, 226, 0.4),
                inset 0 0 20px rgba(255,255,255,0.1);
            max-width: 450px;
            text-align: center;
            transition: all 0.4s ease;
            overflow: hidden;
            cursor: pointer;
        }

        .profile-card:hover {
            transform: translateY(-15px) scale(1.02);
            box-shadow: 
                0 0 0 3px rgba(138, 43, 226, 0.8),
                0 25px 50px rgba(0,0,0,0.7),
                0 0 50px rgba(138, 43, 226, 0.6);
        }

        .profile-img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            margin: 0 auto 20px;
            background: linear-gradient(45deg, #8A2BE2, #00BFFF);
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.6);
            animation: float 3s ease-in-out infinite;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .profile-img:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px rgba(138, 43, 226, 1);
        }

        .profile-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.4);
        }

        .profile-name {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            background: linear-gradient(45deg, #fff, #ddd, #8A2BE2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-name:hover {
            transform: scale(1.05);
            filter: drop-shadow(0 0 15px rgba(138, 43, 226, 0.8));
        }

        .profile-desc {
            font-size: 1.2rem;
            color: #ddd;
            line-height: 1.6;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .profile-desc:hover {
            color: #fff;
            transform: translateY(-2px);
        }

        .profile-tags {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .tag {
            background: rgba(255,255,255,0.1);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            color: #fff;
            border: 1px solid rgba(255,255,255,0.3);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }

        .tag:hover {
            background: rgba(138, 43, 226, 0.3);
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(138, 43, 226, 0.4);
        }

        /* ANIMASI */
        @keyframes animStar {
            from { transform: translateY(0px) rotate(0deg); }
            to { transform: translateY(-2000px) rotate(360deg); }
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.4; }
            100% { transform: scale(1.3); opacity: 0.7; }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            top: 20%;
            left: 10%;
            animation: shoot 3s linear infinite;
            z-index: 2;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(45deg); opacity: 1; }
            100% { transform: translateX(120vw) translateY(120vh) rotate(45deg); opacity: 0; }
        }

        /* TOOLTIP */
        .tooltip {
            position: absolute;
            background: linear-gradient(135deg, rgba(138, 43, 226, 0.95), rgba(0, 191, 255, 0.95));
            color: white;
            padding: 12px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
            white-space: nowrap;
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.3);
            opacity: 0;
            visibility: hidden;
            transform: translateY(10px) scale(0.9);
            transition: all 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            z-index: 1000;
            pointer-events: none;
            max-width: 250px;
            text-align: center;
        }

        .tooltip::before {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            width: 0;
            height: 0;
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid rgba(138, 43, 226, 0.95);
        }

        .tooltip.show {
            opacity: 1;
            visibility: visible;
            transform: translateY(0) scale(1);
        }
    </style>
</head>
<body>
    <!-- LATAR BELAKANG GALAKSI -->
    <div class="galaxy-bg">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="nebula nebula1"></div>
        <div class="nebula nebula2"></div>
        <div class="nebula nebula3"></div>
        <div class="shooting-star"></div>
    </div>

    <!-- KARTU PROFIL -->
    <div class="profile-card" data-tooltip="Klik profil untuk info lengkap! ✨">
        <div class="profile-img" data-tooltip="Foto profil Black_Cat yang super cool! 😎">
            <img src="https://i.pinimg.com/736x/74/17/8b/74178bb61c781a7c3087600cec2a269a.jpg" alt="Black_Cat">
            <div class="tooltip"></div>
        </div>
        
        <h1 class="profile-name" data-tooltip="Nama keren Black_Cat - master rebahan! 🐱">Black_Cat</h1>
        
        <p class="profile-desc" data-tooltip="Deskripsi hidup Black_Cat yang santai banget! 😂">
            Web SIALAAANNNNNNNNN!!!!!!<br>
            <small>Nyari referensiiii!!!!.</small>
        </p>
        
        <div class="profile-tags">
            <span class="tag" data-tooltip="Aktivitas utama: rebahan seharian 💤">Rebahan</span>
            <span class="tag" data-tooltip="Lanjutan rebahan: molor sampe siang 😴">Molor</span>
            <span class="tag" data-tooltip="Energi habis rebahan → langsung makan 🍜">Makan</span>
            <span class="tag" data-tooltip="Opsional setelah makan (kadang) 🛁">Mandi</span>
            <span class="tag" data-tooltip="24/7 aktivitas utama 📱">Main hp</span>
        </div>
    </div>

    <script>
        // SEMUA JAVASCRIPT DI SINI - 100% JALAN!
        document.addEventListener('DOMContentLoaded', function() {
            const tooltipElements = document.querySelectorAll('[data-tooltip]');
            
            tooltipElements.forEach(element => {
                // BUAT TOOLTIP JIKA BELUM ADA
                let tooltip = element.querySelector('.tooltip');
                if (!tooltip) {
                    tooltip = document.createElement('div');
                    tooltip.className = 'tooltip';
                    element.appendChild(tooltip);
                }
                
                tooltip.textContent = element.dataset.tooltip;
                
                // HOVER IN
                element.addEventListener('mouseenter', function(e) {
                    tooltip.classList.add('show');
                    
                    const rect = this.getBoundingClientRect();
                    const tooltipRect = tooltip.getBoundingClientRect();
                    
                    // POSISI OTOMATIS
                    if (rect.bottom + tooltipRect.height > window.innerHeight) {
                        tooltip.style.top = (rect.top - tooltipRect.height - 10) + 'px';
                    } else {
                        tooltip.style.top = (rect.bottom + 10) + 'px';
                    }
                    
                    if (rect.left + tooltipRect.width > window.innerWidth) {
                        tooltip.style.left = (rect.right - tooltipRect.width) + 'px';
                    } else {
                        tooltip.style.left = rect.left + 'px';
                    }
                });
                
                // HOVER OUT
                element.addEventListener('mouseleave', function() {
                    tooltip.classList.remove('show');
                });
                
                // MOBILE TAP
                element.addEventListener('click', function(e) {
                    e.stopPropagation();
                    tooltip.classList.toggle('show');
                });
            });
            
            // PROFIL CLICK EFFECT
            document.querySelector('.profile-card').addEventListener('click', function() {
                this.style.transform = 'scale(0.98)';
                setTimeout(() => this.style.transform = '', 200);
            });
            
            console.log('✅ TOOLTIP ACTIVE! Hover semua elemen!');
        });
    </script>
</body>
</html>

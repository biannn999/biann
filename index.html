<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galaxy Background</title>
    <style>
        /* Reset and basic setup */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box; /* Fixed typo: borde-box -> border-box */
        }

        body {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* The Galaxy Background Layer */
        .galaxy-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background: 
                /* Multiple layered gradients for depth */
                radial-gradient(ellipse at bottom, #1b2735 0%, #090a0f 50%, #000 100%),
                radial-gradient(ellipse at top, #0c0f1a 0%, transparent 50%);
            overflow: hidden;
        }

        /* Enhanced Stars - More stars, varied sizes & colors */
        .stars {
            position: absolute;
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 
                /* Original stars */
                1744px 122px #FFF, 134px 1321px #FFF, 92px 859px #FFF, 
                1829px 1021px #FFF, 123px 45px #FFF, 1500px 1500px #FFF,
                /* More stars for density */
                200px 300px #FFF, 800px 600px #FFF, 1200px 900px #FFF,
                400px 1100px #FFF, 1600px 400px #FFF, 300px 1400px #FFF,
                900px 200px #FFF, 1400px 800px #FFF, 500px 1200px #FFF;
            animation: animStar 70s linear infinite;
            top: 0;
            left: 0;
        }

        .stars2 {
            position: absolute;
            width: 2px;
            height: 2px;
            background: transparent;
            box-shadow: 
                1744px 122px #FFF, 134px 1321px #FFF, 92px 859px #FFF, 
                1829px 1021px #FFF, 123px 45px #FFF, 1500px 1500px #FFF,
                200px 300px #FFF, 800px 600px #FFF, 1200px 900px #FFF;
            animation: animStar 120s linear infinite reverse;
            top: 0;
            left: 0;
        }

        /* Multiple nebulae for richer effect */
        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(40px);
            animation: pulse 8s ease-in-out infinite alternate;
        }

        .nebula1 {
            top: 30%;
            left: 20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(138, 43, 226, 0.3) 0%, rgba(0, 0, 0, 0) 70%);
            animation-delay: 0s;
        }

        .nebula2 {
            top: 60%;
            right: 20%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(30, 144, 255, 0.2) 0%, rgba(0, 0, 0, 0) 70%);
            animation-delay: -2s;
        }

        .nebula3 {
            top: 70%;
            left: 50%;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(255, 20, 147, 0.25) 0%, rgba(0, 0, 0, 0) 70%);
            animation-delay: -4s;
        }

        /* Content Card Styling */
        .content {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            color: white;
            box-shadow: 
                0 15px 35px rgba(0,0,0,0.5),
                0 0 30px rgba(138, 43, 226, 0.3);
            max-width: 400px;
            transition: transform 0.3s ease;
        }

        .content:hover {
            transform: translateY(-10px);
        }

        .content h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
            background: linear-gradient(45deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .content p {
            font-size: 1.1rem;
            color: #ddd;
            line-height: 1.6;
        }

        /* Animations */
        @keyframes animStar {
            from { transform: translateY(0px) rotate(0deg); }
            to { transform: translateY(-2000px) rotate(360deg); }
        }

        @keyframes pulse {
            0% { 
                transform: scale(1); 
                opacity: 0.4; 
            }
            100% { 
                transform: scale(1.3); 
                opacity: 0.7; 
            }
        }

        /* Shooting star effect */
        .shooting-star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: #fff;
            box-shadow: 0 0 10px #fff;
            top: 20%;
            left: 10%;
            animation: shoot 3s linear infinite;
            z-index: 2;
        }

        @keyframes shoot {
            0% {
                transform: translateX(0) translateY(0) rotate(45deg);
                opacity: 1;
            }
            100% {
                transform: translateX(120vw) translateY(120vh) rotate(45deg);
                opacity: 0;
            }
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="galaxy-bg">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="nebula nebula1"></div>
        <div class="nebula nebula2"></div>
        <div class="nebula nebula3"></div>
        <div class="shooting-star"></div>
    </div>

    <!-- Foreground Content -->
    <div class="content">
        <h1>🌌 Deep Space</h1>
        <p>Welcome to the galaxy. This background is created entirely with CSS gradients, box-shadows, and animations.</p>
    </div>
</body>
</html>
